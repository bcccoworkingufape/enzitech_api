version: '3.8'

services:
  api:
    image: ghcr.io/bcccoworkingufape/enzitech_api:latest
    restart: always
    ports:
      - "8082:8080"
    environment:
      - DB_TYPE=postgres
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}

      - MAIL_HOST=postfix
      - MAIL_PORT=25
      - MAIL_USER=${MAIL_USER}
      - MAIL_PASS=${MAIL_PASS}

      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_EXPIRATION_TIME=2d

      - API_VERSION=1.0.0
      - API_URL=${API_URL}
      - SALT_ROUNDS=10
      - AUTH_SESSION_EXPIRATION_MINUTES=2880
      - PORT=8080
      - ADM_EMAIL=${ADM_EMAIL}
      - ADM_PASSWORD=${ADM_PASSWORD}

      - NODE_ENV=production
    depends_on:
      - db
    networks:
      - default
      - mail

  db:
    image: postgres:13
    restart: always
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5434:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:

networks:
  mail:
    external: true
    name: enzitech_mail