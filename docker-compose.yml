version: '3.8'

services:
  api:
    image: ghcr.io/seu_usuario/seu_repositorio:latest
    restart: always
    ports:
      - "8082:8080"
    env_file:
      - .env
    depends_on:
      - db
    networks:
      - default
      - mail

  db:
    image: postgres:13
    restart: always
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5434:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:

networks:
  mail:
    external: true
    name: enzitech_mail