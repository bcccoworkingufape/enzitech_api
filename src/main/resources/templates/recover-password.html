<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Código de Recuperação - Enzitech</title>
</head>
<body style="font-family: Arial, sans-serif; background-color: #f4f4f4; padding: 20px;">
    <div style="max-width: 600px; margin: 0 auto; background: #ffffff; padding: 30px; border-radius: 8px; text-align: center;">
        <h2>Olá, <span th:text="${userName}">Pesquisador</span>!</h2>
        <p>Utilize o código de segurança abaixo no aplicativo para redefinir a sua senha.</p>
        
        <div style="margin: 40px 0;">
            <span th:text="${pinCode}" style="background-color: #f0f0f0; padding: 15px 30px; font-size: 32px; font-weight: bold; letter-spacing: 5px; border-radius: 8px; color: #2e7d32;">
               123456
            </span>
        </div>
        
        <p style="color: #666; font-size: 14px;">Este código é válido por 1 hora. Não o partilhe com ninguém.</p>
        <hr style="border: none; border-top: 1px solid #eeeeee; margin: 20px 0;" />
        <small style="color: #888888;">Equipe Enzitech</small>
    </div>
</body>
</html>
